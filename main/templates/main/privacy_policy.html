<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Политика обработки пд — Modelix</title>
    <link rel="icon" type="image/png" href="/media/services/modelix.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="/static/css/styles.css?v=235.0">
    <style>
        html { scroll-behavior: smooth; }
        body.policy-body {
            margin: 0;
            padding-top: 0 !important;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%) !important;
            color: #e2e8f0;
        }
        html:has(body.policy-body),
        body.policy-body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%) !important;
        }
        .policy-nav {
            position: sticky;
            top: 0;
            z-index: 10000;
            width: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #1a1a24 50%, #1a1a1a 100%);
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.35);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        .policy-nav-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .policy-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0 !important;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(15, 23, 42, 0.35);
            transition: background 0.2s ease, border-color 0.2s ease;
            flex-shrink: 0;
        }
        .policy-back:hover {
            background: rgba(56, 189, 248, 0.12);
            border-color: rgba(125, 211, 252, 0.45);
            color: #fff !important;
        }
        .policy-brand {
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.06em;
            color: #f8fafc;
            text-align: right;
            flex: 1;
        }
        .policy-main {
            max-width: 960px;
            margin: 0 auto;
            padding: 12px 16px 56px;
            box-sizing: border-box;
        }
        .policy-panel {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 14px;
            padding: 26px 22px 36px;
            box-shadow: 0 12px 40px rgba(2, 6, 23, 0.55);
        }
        .policy-panel h1 {
            margin: 0 0 22px;
            font-size: clamp(1.05rem, 2.8vw, 1.35rem);
            font-weight: 700;
            line-height: 1.35;
            color: #f8fafc;
            text-align: center;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        }
        .policy-body-html {
            font-family: inherit;
            font-size: 14px;
            line-height: 1.65;
            margin: 0;
            color: #cbd5e1;
            text-align: left;
        }
        .policy-doc-head {
            margin: 0 0 1.35rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            text-align: center;
        }
        .policy-doc-head p {
            margin: 0.18rem 0;
        }
        .policy-doc-ip {
            margin-bottom: 0.35rem;
        }
        .policy-doc-ip strong {
            font-size: 1.06rem;
            letter-spacing: 0.02em;
            color: #f8fafc;
        }
        .policy-doc-lead-approve {
            margin: 0.25rem auto 0.5rem;
            text-align: center;
            max-width: 100%;
            font-size: clamp(0.88rem, 2.4vw, 1.06rem);
            line-height: 1.35;
            letter-spacing: 0.03em;
            color: #f8fafc;
        }
        .policy-doc-lead-approve strong {
            font-weight: 700;
            white-space: nowrap;
        }
        @media (max-width: 560px) {
            .policy-doc-lead-approve strong {
                white-space: normal;
            }
        }
        .policy-doc-lead {
            font-weight: 600;
            color: #e2e8f0;
            max-width: 34rem;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.45;
        }
        .policy-doc-meta {
            font-size: 0.93rem;
            color: #cbd5e1;
            line-height: 1.45;
        }
        .policy-doc-approve {
            margin: 0.45rem 0 !important;
            letter-spacing: 0.08em;
            color: #f1f5f9;
        }
        .policy-h2 {
            margin: 1.65rem 0 0.95rem;
            padding-bottom: 0.45rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
            font-size: clamp(0.92rem, 2.4vw, 1.08rem);
            font-weight: 700;
            color: #f1f5f9;
            line-height: 1.38;
            letter-spacing: 0.02em;
        }
        .policy-doc-head + .policy-h2 {
            margin-top: 0;
        }
        .policy-clause {
            margin: 0 0 0.85rem;
            display: flex;
            gap: 0.4rem;
            align-items: baseline;
        }
        .policy-num {
            flex-shrink: 0;
            font-weight: 600;
            color: #e2e8f0;
        }
        .policy-clause-body {
            flex: 1;
            min-width: 0;
        }
        .policy-dash-block {
            margin: 0.3rem 0 1rem;
        }
        .policy-dash {
            margin: 0.28rem 0;
            padding-left: 1.15rem;
            text-indent: -1.15rem;
        }
        .policy-dash::before {
            content: "- ";
            color: #94a3b8;
        }
        .policy-p {
            margin: 0 0 0.85rem;
        }
        .policy-variant {
            margin: 1rem 0 0.4rem;
            font-weight: 600;
            color: #e2e8f0;
        }
        @media (min-width: 768px) {
            .policy-main { padding: 22px 24px 64px; }
            .policy-panel { padding: 32px 36px 44px; }
            .policy-body-html { font-size: 15px; }
        }
    </style>
</head>
<body class="policy-body">
    <header class="policy-nav">
        <div class="policy-nav-inner">
            <a href="{% url 'index' %}" class="policy-back"><i class="fas fa-arrow-left" aria-hidden="true"></i> На главную</a>
            <span class="policy-brand">Modelix</span>
        </div>
    </header>
    <main class="policy-main">
        <div class="policy-panel">
            <h1>Политика обработки пд</h1>
            <article class="policy-body-html">{{ policy_html|safe }}</article>
        </div>
    </main>
</body>
</html>
